<!DOCTYPE html>
<html lang="it-IT">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Distributore Automatico - Un progetto di un distributore automatico con funzionalità avanzate.">
  <meta name="keywords" content="distributore automatico, vending machine, progetto, funzionalità avanzate">
  <meta name="author" content="Quezka">
  <meta name="version" content="0.0.2">
  <link id="favicon" rel="icon" href="" type="image/x-icon">
  <link rel="stylesheet" href="./style/style.css">
  <title>Distributore Automatico</title>
</head>

<body>
  <header class="header">
    <h1>Distributore Automatico</h1>
    <ul class="nav">
      <li><a class="nav-link" href="#">Home</a></li>
      <li><a class="nav-link" href="#">Info</a></li>
      <li><a class="nav-link" id="nav-login" href="#">Login</a></li>
    </ul>
  </header>
  <main>
    <div class="login-modal">
      <div class="login-content">
        <button class="close-button">&times;</button>
        <h2>Login</h2>
        <form class="login-form" id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button class="login-button" type="submit">Login</button>
        </form>
      </div>
    </div>
    <section>
      <h2>Benvenuto nel Distributore Automatico</h2>
      <p>Questo è un progetto di un distributore automatico con funzionalità avanzate.</p>
    </section>
  </main>
</body>
<script src="./scripts/script.js"></script>

</html>
